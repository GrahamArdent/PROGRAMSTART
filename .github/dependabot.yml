version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      dev-tools:
        patterns:
          - "ruff"
          - "pyright"
          - "pre-commit"
          - "check-jsonschema"
          - "nox"
          - "pytest*"
          - "coverage"
      docs:
        patterns:
          - "mkdocs*"
      runtime:
        patterns:
          - "playwright"
          - "uv"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github_actions"
    commit-message:
      prefix: "deps"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      ci-actions:
        patterns:
          - "actions/checkout"
          - "actions/setup-python"
          - "actions/cache"
          - "actions/upload-artifact"
      pages-actions:
        patterns:
          - "actions/configure-pages"
          - "actions/upload-pages-artifact"
          - "actions/deploy-pages"
