name: Docs Build And Deploy

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'QUICKSTART.md'
      - '.github/workflows/docs-pages.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'QUICKSTART.md'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: .cache/uv

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-docs-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-docs-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Configure Pages
        if: github.event_name != 'pull_request' && github.event.repository.private == false
        uses: actions/configure-pages@v6

      - name: Upload docs artifact
        if: github.event_name != 'pull_request' && github.event.repository.private == false
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    if: github.event_name != 'pull_request' && github.event.repository.private == false
    needs: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
