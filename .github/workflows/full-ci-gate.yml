name: Full CI Gate (Scheduled)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: .cache/uv
  PRE_COMMIT_HOME: .cache/pre-commit

jobs:
  full-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-full-ci-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-full-ci-${{ runner.os }}-

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ${{ env.PRE_COMMIT_HOME }}
          key: pre-commit-full-ci-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-full-ci-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Install Playwright browser
        run: uv run python -m playwright install --with-deps chromium

      - name: Run full nox CI gate
        run: uv run nox -s ci

      - name: Upload template golden failures
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-ci-golden-failures-template
          path: outputs/golden-failures/**
          if-no-files-found: ignore

      - name: Upload bootstrapped golden failures
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-ci-golden-failures-bootstrap
          path: .tmp_nox_bootstrap/outputs/golden-failures/**
          if-no-files-found: ignore

      - name: Upload distribution artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-ci-dist
          path: dist/*
          if-no-files-found: ignore
