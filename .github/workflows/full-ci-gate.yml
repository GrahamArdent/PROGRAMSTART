name: Full CI Gate (Scheduled)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: .cache/uv
  PRE_COMMIT_HOME: .cache/pre-commit

jobs:
  full-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-full-ci-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-full-ci-${{ runner.os }}-

      - name: Cache pre-commit hooks
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.PRE_COMMIT_HOME }}
          key: pre-commit-full-ci-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-full-ci-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Install Playwright browser
        run: uv run python -m playwright install --with-deps chromium

      - name: Run full nox CI gate
        run: uv run nox -s ci

      - name: Scheduled dependency audit (pip-audit)
        run: uv run pip-audit --desc

      - name: Upload template golden failures
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: full-ci-golden-failures-template
          path: outputs/golden-failures/**
          if-no-files-found: ignore

      - name: Upload bootstrapped golden failures
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: full-ci-golden-failures-bootstrap
          path: .tmp_nox_bootstrap/outputs/golden-failures/**
          if-no-files-found: ignore

      - name: Upload distribution artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: full-ci-dist
          path: dist/*
          if-no-files-found: ignore

  compatibility-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.14']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-full-compat-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-full-compat-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Factory command dry-run
        run: uv run programstart create --dest .tmp_full_compat --project-name FULL-COMPAT --product-shape "CLI tool" --dry-run

      - name: Dashboard API smoke
        run: uv run python scripts/programstart_dashboard_smoke.py

      - name: Run fast test subset
        run: uv run pytest -x --timeout=60 -q
