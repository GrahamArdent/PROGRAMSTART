name: Full CI Gate (Scheduled)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-full-ci-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-full-ci-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Install Playwright browser
        run: uv run python -m playwright install --with-deps chromium

      - name: Run full nox CI gate
        run: uv run nox -s ci