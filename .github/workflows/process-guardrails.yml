name: CI Guardrails

on:
  pull_request:
    paths:
      - 'PROGRAMBUILD/**'
      - 'USERJOURNEY/**'
      - 'BACKUPS/**'
      - '.github/**'
      - 'config/**'
      - 'docs/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'tests/**'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '.secrets.baseline'
      - '.pre-commit-config.yaml'
      - '.python-version'
      - '.yamllint'
      - 'mkdocs.yml'
      - 'noxfile.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'QUICKSTART.md'
      - 'README.md'
  push:
    branches:
      - main
    paths:
      - 'PROGRAMBUILD/**'
      - 'USERJOURNEY/**'
      - 'BACKUPS/**'
      - '.github/**'
      - 'config/**'
      - 'docs/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'tests/**'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '.secrets.baseline'
      - '.pre-commit-config.yaml'
      - '.python-version'
      - '.yamllint'
      - 'mkdocs.yml'
      - 'noxfile.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'QUICKSTART.md'
      - 'README.md'

permissions:
  contents: read

concurrency:
  group: ci-guardrails-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-process:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      UV_CACHE_DIR: .cache/uv
      PRE_COMMIT_HOME: .cache/pre-commit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Cache pre-commit hooks
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.PRE_COMMIT_HOME }}
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Install Playwright browser
        if: runner.os == 'Linux'
        run: uv run python -m playwright install --with-deps chromium

      - name: Install Playwright browser (Windows)
        if: runner.os == 'Windows'
        run: uv run python -m playwright install chromium

      - name: Lint and schema hooks
        run: uv run pre-commit run --all-files

      - name: Type check
        run: uv run pyright

      - name: Test suite
        run: uv run pytest --cov-report=term-missing --cov-report=xml

      - name: Prompt evaluation
        run: uv run programstart prompt-eval --json

      - name: Knowledge status smoke
        run: uv run programstart research --status --json

      - name: Security scan (bandit)
        run: uv run bandit -r scripts/ -ll --skip "B101,B310" -x tests/

      - name: Dependency audit (pip-audit)
        shell: pwsh
        run: |
          uv run pip-audit --desc
          if ($LASTEXITCODE -ne 0) {
            Write-Host "pip-audit reported advisory findings; continuing without failing CI."
            exit 0
          }

      - name: Smoke unified CLI matrix
        run: uv run python scripts/programstart_cli_smoke.py --workspace .

      - name: Upload coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

      - name: Validate structure and metadata
        run: uv run programstart validate --check all --strict

      - name: Validate engineering readiness policy
        run: uv run programstart validate --check engineering-ready

      - name: Validate authority sync
        run: uv run programstart validate --check authority-sync

      - name: Validate rule enforcement
        run: uv run programstart validate --check rule-enforcement

      - name: Drift gate
        run: uv run programstart drift --strict

      - name: Validate planning references
        run: uv run programstart validate --check planning-references

      - name: Validate repo boundary consent policy
        run: uv run programstart validate --check repo-boundary

      - name: Validate workflow state
        run: uv run programstart validate --check workflow-state

      - name: Smoke active-step guides
        run: |
          uv run programstart guide --system programbuild
          uv run programstart guide --system userjourney

      - name: Smoke workflow state output
        run: uv run programstart state show

      - name: Smoke dashboard API in template repo
        run: uv run python scripts/programstart_dashboard_smoke.py

      - name: Smoke dashboard browser in template repo
        run: uv run python scripts/programstart_dashboard_browser_smoke.py --expect-userjourney attached

      - name: Smoke dashboard goldens in template repo
        if: runner.os == 'Linux'
        run: uv run python scripts/programstart_dashboard_golden.py --expect-userjourney attached

      - name: Smoke bootstrap
        run: uv run programstart bootstrap --dest .tmp_ci_bootstrap --project-name CI-SMOKE --variant product

      - name: Smoke one-shot factory create across shapes
        run: uv run python scripts/programstart_factory_smoke.py --workspace . --dest-root .tmp_ci_factory_smoke --require-web-runtime

      - name: Validate bootstrapped repo
        working-directory: .tmp_ci_bootstrap
        run: uv sync --extra dev

      - name: Pre-commit in bootstrapped repo
        working-directory: .tmp_ci_bootstrap
        run: |
          git init
          git add .
          uv run pre-commit run --all-files

      - name: Validate bootstrapped repo state
        working-directory: .tmp_ci_bootstrap
        run: uv run programstart validate --check all

      - name: Smoke unified CLI in bootstrapped repo
        working-directory: .tmp_ci_bootstrap
        run: uv run python scripts/programstart_cli_smoke.py --workspace .

      - name: Smoke dashboard API in bootstrapped repo
        working-directory: .tmp_ci_bootstrap
        run: uv run python scripts/programstart_dashboard_smoke.py

      - name: Smoke dashboard browser in bootstrapped repo
        working-directory: .tmp_ci_bootstrap
        run: uv run python scripts/programstart_dashboard_browser_smoke.py --expect-userjourney absent

      - name: Smoke dashboard goldens in bootstrapped repo
        if: runner.os == 'Linux'
        working-directory: .tmp_ci_bootstrap
        run: uv run python scripts/programstart_dashboard_golden.py --expect-userjourney absent

      - name: Upload template golden failures
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: golden-failures-template-${{ runner.os }}
          path: outputs/golden-failures/**
          if-no-files-found: ignore

      - name: Upload bootstrapped golden failures
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: golden-failures-bootstrap-${{ runner.os }}
          path: .tmp_ci_bootstrap/outputs/golden-failures/**
          if-no-files-found: ignore

      - name: Collect changed files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > changed_files.txt
          elif [[ -n "${{ github.event.before }}" &&
                  "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}...${{ github.sha }}" > changed_files.txt
          else
            git diff --name-only HEAD~1...HEAD > changed_files.txt || true
          fi
          cat changed_files.txt

      - name: Check source-of-truth drift
        run: uv run programstart drift --changed-file-list changed_files.txt

  compatibility-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.14']
    env:
      UV_CACHE_DIR: .cache/uv
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-compat-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-compat-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Factory command dry-run matrix
        shell: bash
        run: |
          uv run programstart create --dest .tmp_compat_create_cli --project-name COMPAT-CLI --product-shape "CLI tool" --dry-run
          uv run programstart create --dest .tmp_compat_create_api --project-name COMPAT-API --product-shape "API service" --need rag --need agents --dry-run
          uv run programstart create --dest .tmp_compat_create_web --project-name COMPAT-WEB --product-shape "web app" --attachment-source USERJOURNEY --dry-run

      - name: Dashboard API smoke
        run: uv run python scripts/programstart_dashboard_smoke.py

      - name: Focused factory tests
        run: uv run pytest tests/test_programstart_project_factory.py tests/test_programstart_validate.py -q
