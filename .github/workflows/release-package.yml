name: Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: .cache/uv

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-release-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-release-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Build distribution artifacts
        run: uv build

      - name: Smoke installed distribution
        run: uv run python scripts/programstart_dist_smoke.py --dist-dir dist --workspace .

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: programstart-dist
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
