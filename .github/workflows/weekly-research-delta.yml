name: Weekly Research Delta

on:
  schedule:
    - cron: '0 14 * * 5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-research-delta-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: python-runtime
            track: 'Python runtime and packaging'
          - slug: llm-retrieval-agent
            track: 'LLM, retrieval, and agent tooling'
          - slug: web-platform-delivery
            track: 'Web and platform delivery'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-research-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-research-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Generate research delta
        run: uv run programstart research --track "${{ matrix.track }}"

      - name: Upload research artifact
        uses: actions/upload-artifact@v7
        with:
          name: research-delta-${{ matrix.slug }}
          path: outputs/research/*.md
          if-no-files-found: error
