name: Weekly Research Delta

on:
  schedule:
    - cron: '0 14 * * 5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-research-delta-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: .cache/uv

jobs:
  knowledge-status:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-research-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-research-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Write knowledge status report
        run: |
          mkdir -p outputs/research
          uv run programstart research --status --json > outputs/research/knowledge-status.json

      - name: Enforce weekly research freshness
        run: uv run programstart research --status --fail-on-due

      - name: Upload knowledge status artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: knowledge-status
          path: outputs/research/knowledge-status.json
          if-no-files-found: error

  generate-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: python-runtime
            track: 'Python runtime and packaging'
          - slug: llm-retrieval-agent
            track: 'LLM, retrieval, and agent tooling'
          - slug: web-platform-delivery
            track: 'Web and platform delivery'
          - slug: mobile-cross-platform
            track: 'Mobile and cross-platform delivery'
          - slug: data-platform-analytics
            track: 'Data platform and analytics tooling'
          - slug: integrations-product-infra
            track: 'Integrations and product infrastructure'
          - slug: desktop-local-first
            track: 'Desktop and local-first delivery'
          - slug: developer-tooling-monorepo
            track: 'Developer tooling and monorepo delivery'
          - slug: realtime-event-driven
            track: 'Realtime and event-driven systems'
          - slug: commerce-customer-platforms
            track: 'Commerce and customer platforms'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-research-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-research-${{ runner.os }}-

      - name: Sync development environment
        run: uv sync --extra dev

      - name: Generate research delta
        run: uv run programstart research --track "${{ matrix.track }}"

      - name: Upload research artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: research-delta-${{ matrix.slug }}
          path: outputs/research/*.md
          if-no-files-found: error
