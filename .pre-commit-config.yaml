minimum_pre_commit_version: 4.5.0
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-ll, --skip, "B101,B310", -x, tests/]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --extra dev pyright
        language: system
        pass_filenames: false
        files: ^(scripts/|tests/|noxfile\.py|pyproject\.toml)

      - id: check-process-registry-schema
        name: check process registry schema
        entry: uv run python scripts/check_process_registry_schema.py
        language: system
        pass_filenames: false
        files: ^(config/process-registry\.json|config/registry/|schemas/process-registry\.schema\.json|scripts/check_process_registry_schema\.py)$

      - id: check-programbuild-state-schema
        name: check programbuild state schema
        entry: check-jsonschema --schemafile schemas/programbuild-state.schema.json PROGRAMBUILD/PROGRAMBUILD_STATE.json
        language: python
        additional_dependencies: [check-jsonschema>=0.37.1]
        pass_filenames: false
        files: ^(PROGRAMBUILD/PROGRAMBUILD_STATE\.json|schemas/programbuild-state\.schema\.json)$

      - id: check-userjourney-state-schema
        name: check userjourney state schema
        entry: check-jsonschema --schemafile schemas/userjourney-state.schema.json
        language: python
        additional_dependencies: [check-jsonschema>=0.37.1]
        pass_filenames: true
        files: ^USERJOURNEY/USERJOURNEY_STATE\.json$

      - id: sync-requirements-txt
        name: sync requirements.txt
        entry: uv export --format requirements-txt --extra dev --no-hashes -o requirements.txt
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

      - id: programstart-validate
        name: programstart validate
        entry: uv run programstart validate --check all --strict
        language: system
        pass_filenames: false
        files: ^(PROGRAMBUILD/|USERJOURNEY/|config/|scripts/|README\.md|QUICKSTART\.md|pyproject\.toml|schemas/)

      - id: programstart-drift
        name: programstart drift check
        entry: uv run programstart drift --strict
        language: system
        pass_filenames: false
        files: ^(PROGRAMBUILD/|USERJOURNEY/|config/process-registry\.json)

      - id: prompt-lint
        name: prompt lint
        entry: uv run python scripts/lint_prompts.py
        language: system
        pass_filenames: true
        files: \.prompt\.md$

      - id: conventional-commits
        name: commit message (Conventional Commits)
        language: system
        entry: uv run python scripts/check_commit_msg.py
        stages: [commit-msg]
        pass_filenames: true
