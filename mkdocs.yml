site_name: PROGRAMSTART
site_description: PROGRAMSTART workflow platform documentation
repo_name: PROGRAMSTART
docs_dir: docs
validation:
  links:
    not_found: info
    absolute_links: ignore
    unrecognized_links: ignore
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
nav:
  - Overview: index.md
  - Workflow Model: workflow-model.md
  - Context Layer: context-layer.md
  - Knowledge Base: knowledge-base.md
  - Knowledge Ops: knowledge-ops.md
  - Retrieval Architecture: retrieval-architecture.md
  - Dashboard API: dashboard-api.md
  - Reusable Patterns: reusable-patterns.md
  - Defaults Review: defaults-review.md
  - Toolchain: toolchain.md
  - Verification: verification.md
  - Decisions:
      - Index: decisions/README.md
